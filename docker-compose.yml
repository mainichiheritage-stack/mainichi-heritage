services:
  db:
    image: postgres:15
    container_name: heritage-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: heritage-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: heritage-frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - WATCHPACK_POLLING=true
      # ブラウザ用
      - NEXT_PUBLIC_AXIOM_TOKEN=${NEXT_PUBLIC_AXIOM_TOKEN}
      - NEXT_PUBLIC_AXIOM_DATASET=${NEXT_PUBLIC_AXIOM_DATASET}
      # サーバー転送用
      - AXIOM_TOKEN=${NEXT_PUBLIC_AXIOM_TOKEN}
      - AXIOM_DATASET=${NEXT_PUBLIC_AXIOM_DATASET}
    command: npm run dev -- --webpack

volumes:
  db_data:
  frontend_node_modules:
